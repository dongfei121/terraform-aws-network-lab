name: terraform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  fmt-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      # fmt: 只检查真正的 tf 目录
      - name: Terraform fmt (check) - modules
        run: terraform fmt -check -recursive modules

      - name: Terraform fmt (check) - envs
        run: terraform fmt -check -recursive envs

      # validate: 只在 entrypoint 环境跑
      - name: Terraform init (no backend) + validate (envs/dev)
        working-directory: envs/dev
        run: |
          terraform init -backend=false -no-color
          terraform validate -no-color
