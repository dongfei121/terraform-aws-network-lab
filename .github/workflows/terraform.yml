name: terraform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive -diff

      - name: Terraform init + validate (envs/dev)
        run: |
          terraform -chdir=envs/dev init -backend=false -no-color
          terraform -chdir=envs/dev validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.0

      - name: TFLint (envs/dev)
        run: |
          cd envs/dev
          tflint --init
          tflint -f compact

      - name: Checkov (IaC security scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          framework: terraform
          # Lab/demo: allow bastion public IP + accept KMS key-policy tradeoffs
          skip_check: CKV_AWS_88,CKV_AWS_356,CKV_AWS_109,CKV_AWS_111
